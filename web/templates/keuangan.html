<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#10b981">
    <title>Keuangan - Dashboard Adi</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/extras.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            min-height: 100vh;
        }
        .keuangan-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .keuangan-header {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .keuangan-header h1 {
            color: #10b981;
            margin: 0 0 8px 0;
            font-size: 28px;
        }
        .last-update-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f0fdf4;
            color: #10b981;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        .last-update-badge i {
            font-size: 12px;
        }
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .summary-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .summary-card.pemasukan {
            border-left: 4px solid #10b981;
        }
        .summary-card.pengeluaran {
            border-left: 4px solid #ef4444;
        }
        .summary-card.saldo {
            border-left: 4px solid #3b82f6;
        }
        .summary-card h3 {
            color: #6b7280;
            font-size: 14px;
            margin: 0 0 8px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .summary-card .amount {
            font-size: 32px;
            font-weight: 700;
            margin: 0;
        }
        .summary-card.pemasukan .amount { color: #10b981; }
        .summary-card.pengeluaran .amount { color: #ef4444; }
        .summary-card.saldo .amount { color: #3b82f6; }
        .transactions-section {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .transactions-section h2 {
            color: #374151;
            margin: 0 0 20px 0;
            font-size: 20px;
        }
        .transaction-table {
            width: 100%;
            border-collapse: collapse;
        }
        .transaction-table th {
            background: #f9fafb;
            color: #6b7280;
            font-weight: 600;
            text-align: left;
            padding: 12px 16px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .transaction-table td {
            padding: 16px;
            border-bottom: 1px solid #f3f4f6;
            color: #374151;
        }
        .transaction-table tr:last-child td {
            border-bottom: none;
        }
        .transaction-table tr:hover {
            background: #f9fafb;
        }
        .badge-jenis {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-jenis.pemasukan {
            background: #d1fae5;
            color: #10b981;
        }
        .badge-jenis.pengeluaran {
            background: #fee2e2;
            color: #ef4444;
        }
        .jumlah-positive {
            color: #10b981;
            font-weight: 600;
        }
        .jumlah-negative {
            color: #ef4444;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }
        .error-message {
            background: #fee2e2;
            color: #ef4444;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }
        @media (max-width: 768px) {
            .keuangan-container {
                padding: 12px;
            }
            .summary-cards {
                grid-template-columns: 1fr;
            }
            .summary-card .amount {
                font-size: 24px;
            }
            .transaction-table {
                font-size: 14px;
            }
            .transaction-table th,
            .transaction-table td {
                padding: 10px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="keuangan-container">
        <!-- Header -->
        <div class="keuangan-header">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
                <div>
                    <h1>💳 Catatan Keuangan</h1>
                    <p style="color: #6b7280; margin: 0;">Pemasukan dan pengeluaran pribadi</p>
                </div>
                <div class="last-update-badge">
                    <i class="fas fa-clock"></i>
                    <span id="last-update">Memuat...</span>
                </div>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="summary-cards">
            <div class="summary-card pemasukan">
                <h3>💰 Total Pemasukan</h3>
                <p class="amount" id="total-masuk">Rp 0</p>
            </div>
            <div class="summary-card pengeluaran">
                <h3>📤 Total Pengeluaran</h3>
                <p class="amount" id="total-keluar">Rp 0</p>
            </div>
            <div class="summary-card saldo">
                <h3>🏦 Saldo</h3>
                <p class="amount" id="total-saldo">Rp 0</p>
            </div>
        </div>

        <!-- Transactions Table -->
        <div class="transactions-section">
            <h2>📋 Riwayat Transaksi</h2>
            <div id="transactions-container">
                <table class="transaction-table" id="transactions-table">
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Jenis</th>
                            <th>Kategori</th>
                            <th>Deskripsi</th>
                            <th style="text-align: right;">Jumlah</th>
                        </tr>
                    </thead>
                    <tbody id="transactions-tbody">
                        <tr><td colspan="5" class="loading">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Back to Dashboard -->
        <div style="text-align: center; margin-top: 20px;">
            <a href="/" style="color: white; text-decoration: none; background: rgba(255,255,255,0.2); padding: 12px 24px; border-radius: 8px; display: inline-block;">
                ← Kembali ke Dashboard
            </a>
        </div>
    </div>

    <script>
        // Format currency
        function formatCurrency(value) {
            if (!value) return 'Rp 0';
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(value);
        }

        // Format date
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('id-ID', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
            } catch (e) {
                return dateStr;
            }
        }

        // Load keuangan data
        async function loadKeuangan() {
            try {
                const response = await fetch('/api/keuangan');
                if (!response.ok) throw new Error('Gagal mengambil data');
                
                const result = await response.json();
                
                if (!result.data || result.data.length === 0) {
                    document.getElementById('transactions-tbody').innerHTML = 
                        '<tr><td colspan="5" class="loading">Tidak ada data transaksi</td></tr>';
                    return;
                }

                // Update last update
                document.getElementById('last-update').textContent = 
                    result.last_update || 'Tanggal tidak tersedia';

                // Calculate totals
                let totalMasuk = 0;
                let totalKeluar = 0;
                
                result.data.forEach(t => {
                    if (t.jenis === 'Pemasukan') {
                        totalMasuk += t.jumlah || 0;
                    } else {
                        totalKeluar += t.jumlah || 0;
                    }
                });

                const saldo = totalMasuk - totalKeluar;

                // Update summary
                document.getElementById('total-masuk').textContent = formatCurrency(totalMasuk);
                document.getElementById('total-keluar').textContent = formatCurrency(totalKeluar);
                document.getElementById('total-saldo').textContent = formatCurrency(saldo);

                // Fill table
                const tbody = document.getElementById('transactions-tbody');
                tbody.innerHTML = '';
                
                // Sort by date descending
                const sorted = [...result.data].sort((a, b) => {
                    return new Date(b.tanggal) - new Date(a.tanggal);
                });

                sorted.forEach(row => {
                    const tr = document.createElement('tr');
                    const isPemasukan = row.jenis === 'Pemasukan';
                    const jumlahClass = isPemasukan ? 'jumlah-positive' : 'jumlah-negative';
                    const jumlahPrefix = isPemasukan ? '+' : '-';
                    
                    tr.innerHTML = `
                        <td>${formatDate(row.tanggal)}</td>
                        <td><span class="badge-jenis ${row.jenis.toLowerCase()}">${row.jenis}</span></td>
                        <td>${row.kategori || '-'}</td>
                        <td>${row.deskripsi || '-'}</td>
                        <td style="text-align: right;" class="${jumlahClass}">
                            ${jumlahPrefix} ${formatCurrency(row.jumlah)}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('transactions-tbody').innerHTML = 
                    `<tr><td colspan="5" class="error-message">Error: ${error.message}</td></tr>`;
            }
        }

        // Load on page load
        document.addEventListener('DOMContentLoaded', loadKeuangan);
        
        // Auto refresh every 30 seconds
        setInterval(loadKeuangan, 30000);
    </script>
</body>
</html>
