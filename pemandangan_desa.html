<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pemandangan Desa - adioranye</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; font-family: 'Georgia', serif; }
.container { width: 800px; height: 600px; position: relative; overflow: hidden; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
svg { width: 100%; height: 100%; }
</style>
</head>
<body>
<div class="container">
<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="40%" stop-color="#B0E0E6"/>
      <stop offset="100%" stop-color="#E0F7FA"/>
    </linearGradient>
    <linearGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#FFD54F"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF9C4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFF9C4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mountain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5D8A3C"/>
      <stop offset="100%" stop-color="#3E6B1F"/>
    </linearGradient>
    <linearGradient id="riceField" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8BC34A"/>
      <stop offset="100%" stop-color="#689F38"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#5D4037"/>
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="800" height="600" fill="url(#sky)"/>
  
  <!-- Sun glow -->
  <circle cx="650" cy="100" r="80" fill="url(#sunGlow)"/>
  <!-- Sun -->
  <circle cx="650" cy="100" r="35" fill="#FFD54F"/>
  
  <!-- Clouds -->
  <g opacity="0.8">
    <ellipse cx="150" cy="80" rx="60" ry="25" fill="white"/>
    <ellipse cx="180" cy="70" rx="40" ry="20" fill="white"/>
    <ellipse cx="120" cy="75" rx="35" ry="18" fill="white"/>
  </g>
  <g opacity="0.6">
    <ellipse cx="500" cy="60" rx="50" ry="20" fill="white"/>
    <ellipse cx="530" cy="52" rx="35" ry="16" fill="white"/>
    <ellipse cx="475" cy="56" rx="30" ry="14" fill="white"/>
  </g>
  <g opacity="0.7">
    <ellipse cx="350" cy="120" rx="45" ry="18" fill="white"/>
    <ellipse cx="375" cy="112" rx="30" ry="14" fill="white"/>
  </g>
  
  <!-- Mountains background -->
  <path d="M0,300 L100,200 L200,250 L350,170 L500,230 L650,180 L800,250 L800,300 Z" fill="#6B8E4E" opacity="0.6"/>
  <path d="M0,320 L150,240 L300,280 L450,220 L600,270 L750,230 L800,280 L800,320 Z" fill="url(#mountain)"/>
  
  <!-- Hills -->
  <path d="M0,350 Q200,300 400,340 Q600,310 800,350 L800,400 L0,400 Z" fill="#7CB342"/>
  
  <!-- Rice fields -->
  <path d="M0,400 Q200,370 400,390 Q600,375 800,400 L800,450 L0,450 Z" fill="url(#riceField)"/>
  <!-- Rice field lines -->
  <path d="M50,410 Q200,395 350,405 Q500,390 650,400 Q750,395 800,405" stroke="#7CB34A" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M0,420 Q200,405 400,415 Q600,400 800,420" stroke="#7CB34A" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M0,430 Q200,418 400,425 Q600,412 800,430" stroke="#7CB34A" stroke-width="1" fill="none" opacity="0.5"/>
  
  <!-- River -->
  <path d="M0,450 Q100,445 200,455 Q350,460 500,450 Q650,440 800,455" fill="none" stroke="url(#water)" stroke-width="25" opacity="0.8"/>
  <path d="M0,450 Q100,445 200,455 Q350,460 500,450 Q650,440 800,455" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
  
  <!-- Ground -->
  <rect x="0" y="465" width="800" height="135" fill="#558B2F"/>
  
  <!-- Trees left -->
  <g transform="translate(50,280)">
    <rect x="15" y="30" width="10" height="40" fill="#5D4037"/>
    <ellipse cx="20" cy="20" rx="25" ry="30" fill="#2E7D32"/>
    <ellipse cx="15" cy="25" rx="18" ry="22" fill="#388E3C"/>
  </g>
  <g transform="translate(100,290)">
    <rect x="12" y="25" width="8" height="35" fill="#5D4037"/>
    <ellipse cx="16" cy="15" rx="20" ry="25" fill="#33691E"/>
    <ellipse cx="12" cy="20" rx="15" ry="18" fill="#2E7D32"/>
  </g>
  
  <!-- Trees right -->
  <g transform="translate(680,275)">
    <rect x="15" y="30" width="10" height="45" fill="#5D4037"/>
    <ellipse cx="20" cy="18" rx="28" ry="32" fill="#2E7D32"/>
    <ellipse cx="14" cy="24" rx="20" ry="24" fill="#388E3C"/>
  </g>
  <g transform="translate(730,285)">
    <rect x="12" y="25" width="8" height="35" fill="#5D4037"/>
    <ellipse cx="16" cy="15" rx="22" ry="26" fill="#33691E"/>
  </g>
  
  <!-- Bamboo cluster -->
  <g transform="translate(380,300)" opacity="0.8">
    <line x1="0" y1="0" x2="0" y2="60" stroke="#7CB342" stroke-width="3"/>
    <line x1="5" y1="-5" x2="5" y2="55" stroke="#689F38" stroke-width="3"/>
    <line x1="-4" y1="3" x2="-4" y2="63" stroke="#7CB342" stroke-width="2"/>
    <ellipse cx="0" cy="-5" rx="12" ry="8" fill="#558B2F" opacity="0.6"/>
    <ellipse cx="5" cy="-10" rx="10" ry="7" fill="#689F38" opacity="0.6"/>
  </g>
  
  <!-- House 1 (Javanese style) -->
  <g transform="translate(250,360)">
    <rect x="0" y="25" width="70" height="45" fill="#D7CCC8"/>
    <rect x="5" y="30" width="15" height="20" fill="#FFE0B2"/>
    <rect x="50" y="30" width="15" height="20" fill="#FFE0B2"/>
    <rect x="28" y="45" width="14" height="25" fill="#5D4037"/>
    <!-- Roof -->
    <path d="M-10,25 L35,0 L80,25 Z" fill="url(#roof)"/>
    <path d="M-10,25 L35,5 L80,25" fill="none" stroke="#4E342E" stroke-width="1"/>
  </g>
  
  <!-- House 2 -->
  <g transform="translate(420,365)">
    <rect x="0" y="20" width="60" height="40" fill="#BCAAA4"/>
    <rect x="5" y="25" width="12" height="16" fill="#FFE0B2"/>
    <rect x="43" y="25" width="12" height="16" fill="#FFE0B2"/>
    <rect x="22" y="40" width="12" height="20" fill="#4E342E"/>
    <!-- Roof -->
    <path d="M-8,20 L30,0 L68,20 Z" fill="#8D6E63"/>
  </g>
  
  <!-- House 3 (small) -->
  <g transform="translate(550,370)">
    <rect x="0" y="18" width="50" height="35" fill="#D7CCC8"/>
    <rect x="5" y="22" width="10" height="14" fill="#FFE0B2"/>
    <rect x="35" y="22" width="10" height="14" fill="#FFE0B2"/>
    <path d="M-6,18 L25,0 L56,18 Z" fill="#795548"/>
  </g>
  
  <!-- Fence -->
  <g stroke="#5D4037" stroke-width="2" opacity="0.6">
    <line x1="220" y1="400" x2="220" y2="415"/>
    <line x1="235" y1="400" x2="235" y2="415"/>
    <line x1="250" y1="400" x2="250" y2="415"/>
    <line x1="220" y1="405" x2="250" y2="405"/>
    <line x1="220" y1="410" x2="250" y2="410"/>
  </g>
  
  <!-- Animals -->
  <!-- Cow -->
  <g transform="translate(180,410)">
    <ellipse cx="15" cy="10" rx="15" ry="10" fill="#8D6E63"/>
    <ellipse cx="0" cy="5" rx="5" ry="4" fill="#795548"/>
    <line x1="5" y1="20" x2="5" y2="30" stroke="#5D4037" stroke-width="2"/>
    <line x1="12" y1="20" x2="12" y2="30" stroke="#5D4037" stroke-width="2"/>
    <line x1="18" y1="20" x2="18" y2="30" stroke="#5D4037" stroke-width="2"/>
    <line x1="25" y1="20" x2="25" y2="30" stroke="#5D4037" stroke-width="2"/>
  </g>
  
  <!-- Chicken -->
  <g transform="translate(350,415)">
    <ellipse cx="5" cy="5" rx="5" ry="4" fill="#FFCC80"/>
    <circle cx="9" cy="2" r="3" fill="#FFCC80"/>
    <line x1="11" y1="1" x2="13" y2="0" stroke="#FF5722" stroke-width="2"/>
    <line x1="3" y1="9" x2="2" y2="14" stroke="#5D4037" stroke-width="1"/>
    <line x1="7" y1="9" x2="8" y2="14" stroke="#5D4037" stroke-width="1"/>
    <path d="M7,-1 Q9,-4 11,-1" fill="#C62828"/>
  </g>
  
  <!-- Duck -->
  <g transform="translate(500,445)">
    <ellipse cx="8" cy="5" rx="8" ry="5" fill="white"/>
    <circle cx="14" cy="2" r="3" fill="white"/>
    <path d="M16,1 L19,2 L16,3" fill="#FF9800"/>
    <line x1="5" y1="10" x2="4" y2="15" stroke="#FF9800" stroke-width="1"/>
    <line x1="10" y1="10" x2="11" y2="15" stroke="#FF9800" stroke-width="1"/>
  </g>
  
  <!-- Birds -->
  <g fill="none" stroke="#37474F" stroke-width="1.5">
    <path d="M300,140 Q305,135 310,140 Q315,135 320,140"/>
    <path d="M340,125 Q344,121 348,125 Q352,121 356,125"/>
    <path d="M280,155 Q283,151 286,155 Q289,151 292,155"/>
  </g>
  
  <!-- Butterfly -->
  <g transform="translate(620,400)" fill="#E91E63" opacity="0.8">
    <ellipse cx="0" cy="0" rx="4" ry="6" transform="rotate(-20)"/>
    <ellipse cx="6" cy="0" rx="4" ry="6" transform="rotate(20)"/>
    <line x1="3" y1="-3" x2="3" y2="5" stroke="#880E4F" stroke-width="1"/>
  </g>
  
  <!-- Flowers -->
  <circle cx="580" cy="430" r="3" fill="#E91E63"/>
  <circle cx="600" cy="425" r="2.5" fill="#FF9800"/>
  <circle cx="610" cy="432" r="3" fill="#9C27B0"/>
  <circle cx="590" cy="428" r="2" fill="#F44336"/>
  
  <!-- Path -->
  <path d="M400,460 Q380,480 390,500 Q400,520 380,540 Q370,560 380,600" fill="none" stroke="#8D6E63" stroke-width="15" opacity="0.4"/>
  <path d="M400,460 Q380,480 390,500 Q400,520 380,540 Q370,560 380,600" fill="none" stroke="#A1887F" stroke-width="8" opacity="0.3"/>
  
  <!-- Grass details -->
  <g stroke="#4CAF50" stroke-width="1.5" opacity="0.7">
    <line x1="100" y1="470" x2="95" y2="460"/>
    <line x1="103" y1="470" x2="108" y2="458"/>
    <line x1="700" y1="475" x2="695" y2="465"/>
    <line x1="703" y1="475" x2="708" y2="463"/>
    <line x1="450" y1="480" x2="445" y2="470"/>
    <line x1="453" y1="480" x2="458" y2="468"/>
  </g>
  
  <!-- Water reflection -->
  <g opacity="0.2">
    <rect x="100" y="452" width="30" height="2" fill="white" rx="1"/>
    <rect x="300" y="448" width="20" height="2" fill="white" rx="1"/>
    <rect x="550" y="454" width="25" height="2" fill="white" rx="1"/>
    <rect x="700" y="450" width="15" height="2" fill="white" rx="1"/>
  </g>
  
  <!-- Title -->
  <text x="400" y="560" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="white" opacity="0.9" font-weight="bold">🌾 Pemandangan Desa 🌾</text>
  <text x="400" y="585" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="white" opacity="0.7">by adioranye for Adi</text>
</svg>
</div>
</body>
</html>
