<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pemandangan Yogyakarta - adioranye</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); font-family: 'Georgia', serif; }
.container { width: 900px; height: 650px; position: relative; overflow: hidden; border-radius: 16px; box-shadow: 0 30px 80px rgba(0,0,0,0.7); }
svg { width: 100%; height: 100%; }
</style>
</head>
<body>
<div class="container">
<svg viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="30%" stop-color="#E0F6FF"/>
      <stop offset="100%" stop-color="#FFE5B4"/>
    </linearGradient>
    <linearGradient id="merapi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B7355"/>
      <stop offset="50%" stop-color="#654321"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
    <linearGradient id="sawah" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7CB342"/>
      <stop offset="100%" stop-color="#558B2F"/>
    </linearGradient>
    <radialGradient id="matahari" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8DC" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="900" height="650" fill="url(#skyGradient)"/>
  
  <!-- Sun glow -->
  <circle cx="750" cy="80" r="100" fill="url(#matahari)"/>
  <!-- Sun -->
  <circle cx="750" cy="80" r="40" fill="#FFD54F"/>
  
  <!-- Clouds -->
  <g opacity="0.7">
    <ellipse cx="150" cy="60" rx="70" ry="30" fill="white"/>
    <ellipse cx="190" cy="50" rx="45" ry="22" fill="white"/>
    <ellipse cx="120" cy="55" rx="40" ry="20" fill="white"/>
  </g>
  <g opacity="0.6">
    <ellipse cx="550" cy="90" rx="60" ry="28" fill="white"/>
    <ellipse cx="600" cy="80" rx="40" ry="20" fill="white"/>
  </g>
  
  <!-- Gunung Merapi (background) -->
  <path d="M0,350 L200,150 L450,200 L700,140 L900,350 L900,400 L0,400 Z" fill="#6B5D4F" opacity="0.5"/>
  <path d="M80,350 L250,120 L420,200 L650,110 L850,350 L850,380 L80,380 Z" fill="url(#merapi)" opacity="0.8"/>
  
  <!-- Gunung Merapi peak (snow) -->
  <path d="M250,120 L240,140 L260,140 Z" fill="white" opacity="0.9"/>
  <path d="M250,120 L230,155 L270,155 Z" fill="#F5F5F5" opacity="0.7"/>
  
  <!-- Haze/mist on mountain -->
  <ellipse cx="250" cy="200" rx="150" ry="60" fill="white" opacity="0.15"/>
  <ellipse cx="450" cy="180" rx="100" ry="40" fill="white" opacity="0.12"/>
  
  <!-- Rice fields terraces -->
  <path d="M0,400 Q225,390 450,410 Q675,390 900,400 L900,450 L0,450 Z" fill="#8BC34A"/>
  <path d="M0,450 Q225,440 450,460 Q675,440 900,450 L900,500 L0,500 Z" fill="#7CB342"/>
  <path d="M0,500 Q225,490 450,510 Q675,490 900,500 L900,550 L0,550 Z" fill="#689F38"/>
  
  <!-- Rice field patterns (irrigation) -->
  <path d="M0,425 Q200,420 400,430 Q600,420 900,425" stroke="#5A7330" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M0,475 Q200,470 400,480 Q600,470 900,475" stroke="#5A7330" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M0,525 Q200,520 400,530 Q600,520 900,525" stroke="#5A7330" stroke-width="1.5" fill="none" opacity="0.4"/>
  
  <!-- Water channels -->
  <path d="M0,445 Q150,442 300,448 Q450,442 600,450 Q750,445 900,450" fill="none" stroke="#4FC3F7" stroke-width="3" opacity="0.6"/>
  <path d="M0,495 Q150,492 300,498 Q450,492 600,500 Q750,495 900,500" fill="none" stroke="#4FC3F7" stroke-width="2.5" opacity="0.5"/>
  
  <!-- Candi Borobudur silhouette (far left) -->
  <g opacity="0.4">
    <!-- Base -->
    <rect x="60" y="380" width="80" height="40" fill="#8B7355"/>
    <!-- Levels (simplified) -->
    <rect x="65" y="360" width="70" height="20" fill="#9B8B6F"/>
    <rect x="70" y="340" width="60" height="20" fill="#AB9B7F"/>
    <rect x="75" y="320" width="50" height="20" fill="#9B8B6F"/>
    <!-- Top -->
    <polygon points="95,310 90,300 100,300" fill="#8B7355"/>
  </g>
  
  <!-- Traditional house (right side) -->
  <g transform="translate(750, 420)">
    <!-- Main structure -->
    <rect x="0" y="20" width="90" height="50" fill="#D2B48C"/>
    <!-- Roof (joglo style) -->
    <path d="M-15,20 L45,0 L105,20 Z" fill="#8B4513"/>
    <path d="M-15,20 L45,5 L105,20" fill="none" stroke="#654321" stroke-width="2"/>
    <!-- Door -->
    <rect x="30" y="45" width="30" height="25" fill="#5D4037"/>
    <!-- Windows -->
    <rect x="10" y="30" width="12" height="12" fill="#FFE082"/>
    <rect x="68" y="30" width="12" height="12" fill="#FFE082"/>
  </g>
  
  <!-- Traditional house (left-center) -->
  <g transform="translate(120, 450)">
    <rect x="0" y="15" width="75" height="40" fill="#C4A66E"/>
    <path d="M-10,15 L37.5,-5 L85,15 Z" fill="#704214"/>
    <rect x="20" y="35" width="20" height="20" fill="#4E342E"/>
    <rect x="10" y="22" width="10" height="10" fill="#FFC107"/>
    <rect x="55" y="22" width="10" height="10" fill="#FFC107"/>
  </g>
  
  <!-- Farmers in rice field -->
  <g transform="translate(200, 520)">
    <!-- Head -->
    <circle cx="5" cy="5" r="3" fill="#8B6F47"/>
    <!-- Body -->
    <rect x="3" y="8" width="4" height="10" fill="#2E7D32"/>
    <!-- Legs -->
    <line x1="4" y1="18" x2="4" y2="25" stroke="#8B6F47" stroke-width="1.5"/>
    <line x1="6" y1="18" x2="6" y2="25" stroke="#8B6F47" stroke-width="1.5"/>
    <!-- Hat -->
    <ellipse cx="5" cy="2" rx="4" ry="2" fill="#D2B48C"/>
  </g>
  
  <!-- Farmers in rice field (2) -->
  <g transform="translate(650, 510)">
    <circle cx="5" cy="5" r="3" fill="#8B6F47"/>
    <rect x="3" y="8" width="4" height="10" fill="#1565C0"/>
    <line x1="4" y1="18" x2="4" y2="25" stroke="#8B6F47" stroke-width="1.5"/>
    <line x1="6" y1="18" x2="6" y2="25" stroke="#8B6F47" stroke-width="1.5"/>
    <ellipse cx="5" cy="2" rx="4" ry="2" fill="#D2B48C"/>
  </g>
  
  <!-- Palm trees -->
  <g transform="translate(400, 380)">
    <!-- Trunk -->
    <rect x="15" y="30" width="10" height="50" fill="#8B6F47"/>
    <!-- Fronds -->
    <ellipse cx="20" cy="25" rx="20" ry="15" fill="#2E7D32" transform="rotate(-30 20 25)"/>
    <ellipse cx="20" cy="25" rx="20" ry="15" fill="#388E3C" transform="rotate(30 20 25)"/>
    <ellipse cx="20" cy="25" rx="20" ry="15" fill="#2E7D32" transform="rotate(-60 20 25)"/>
    <ellipse cx="20" cy="25" rx="20" ry="15" fill="#388E3C" transform="rotate(60 20 25)"/>
  </g>
  
  <!-- Banana trees -->
  <g transform="translate(700, 390)">
    <rect x="8" y="40" width="8" height="40" fill="#795548"/>
    <ellipse cx="12" cy="30" rx="15" ry="20" fill="#558B2F"/>
    <ellipse cx="12" cy="32" rx="12" ry="16" fill="#6B8E4E"/>
  </g>
  
  <!-- Birds in sky -->
  <g stroke="#37474F" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M200,150 Q210,145 220,150"/>
    <path d="M225,140 Q232,136 239,140"/>
    <path d="M650,120 Q660,115 670,120"/>
  </g>
  
  <!-- Butterflies -->
  <g transform="translate(500, 300)" fill="#E91E63" opacity="0.7">
    <ellipse cx="0" cy="0" rx="3" ry="5" transform="rotate(-25)"/>
    <ellipse cx="6" cy="0" rx="3" ry="5" transform="rotate(25)"/>
    <line x1="3" y1="-2" x2="3" y2="4" stroke="#880E4F" stroke-width="1"/>
  </g>
  
  <!-- Flowers in field -->
  <circle cx="150" cy="530" r="2" fill="#FF69B4"/>
  <circle cx="280" cy="540" r="2" fill="#FFB6C1"/>
  <circle cx="320" cy="525" r="2" fill="#FF1493"/>
  <circle cx="750" cy="545" r="2" fill="#FF69B4"/>
  <circle cx="800" cy="535" r="2" fill="#FFB6C1"/>
  
  <!-- Foreground grass detail -->
  <g stroke="#4CAF50" stroke-width="1" opacity="0.5">
    <line x1="50" y1="560" x2="45" y2="550"/>
    <line x1="55" y1="560" x2="60" y2="550"/>
    <line x1="850" y1="570" x2="845" y2="560"/>
    <line x1="860" y1="570" x2="865" y2="558"/>
  </g>
  
  <!-- Water reflection glow -->
  <ellipse cx="300" cy="450" rx="50" ry="8" fill="white" opacity="0.1"/>
  <ellipse cx="600" cy="500" rx="40" ry="6" fill="white" opacity="0.08"/>
  
  <!-- Title and credit -->
  <text x="450" y="620" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="white" opacity="0.95" font-weight="bold">🏔️ Pemandangan Alam Yogyakarta 🏔️</text>
  <text x="450" y="645" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="white" opacity="0.7">by adioranye for Adi - Gunung Merapi, Sawah, Budaya Jawa</text>
</svg>
</div>
</body>
</html>
